<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God Mode Video Call</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        
        .controls {
            margin-top: 10px;
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }
        
        select, button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        select { background-color: #333; color: #fff; border: 1px solid #00ff88; }
        
        #callButton { background-color: #00ff88; color: #000; }
        #callButton:hover { background-color: #00cc6a; }
        
        #acceptButton { background-color: #ff3366; color: #fff; display: none; }
        #acceptButton:hover { background-color: #e62e5c; }

        #statusText {
            color: #ffcc00;
            margin-top: 10px;
            font-size: 1.2rem;
            width: 100%;
            text-align: center;
        }

        /* WHATSAPP STYLE VIDEO CONTAINER */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/9;
            background-color: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid #00ff88;
            margin-top: 20px;
            box-shadow: 0px 0px 20px rgba(0, 255, 136, 0.2);
        }

        /* Badi Screen (Main) */
        .main-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Choti Screen (PIP) */
        .pip-video {
            position: absolute;
            width: 120px;
            height: 160px;
            bottom: 20px;
            right: 20px;
            border-radius: 8px;
            border: 2px solid white;
            object-fit: cover;
            z-index: 10;
            cursor: pointer;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .pip-video:hover { transform: scale(1.05); }

        /* Chupane ke liye */
        .hidden { display: none !important; }

        /* Aapka camera hamesha mirror rahega */
        #localVideo { transform: scaleX(-1); }

    </style>
</head>
<body>

    <h2>Premium HD Video Call</h2>
    
    <div class="controls">
        <select id="qualitySelect">
            <option value="1080">Full HD (1080p)</option>
            <option value="720">HD (720p)</option>
        </select>
        <button id="callButton">Call Lagao 📞</button>
        <button id="acceptButton">Call Uthao 🟢</button>
    </div>
    
    <div id="statusText">Dost ka wait kar rahe hain...</div>

    <!-- Naya Container -->
    <div class="video-wrapper">
        <!-- Call lagne se pehle Aap badi screen par -->
        <video id="localVideo" class="main-video" autoplay playsinline muted></video>
        <!-- Dost chhupa hua hai -->
        <video id="remoteVideo" class="pip-video hidden" autoplay playsinline></video>
    </div>

    <!-- Strong CDN link -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    
    <!-- Aapka logic -->
    <script src="script.js"></script>

</body>
</html>
