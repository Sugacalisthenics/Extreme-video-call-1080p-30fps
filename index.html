<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium HD Video Call</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .controls {
            margin-top: 10px;
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            align-items: center;
        }
        select, button {
            padding: 10px 15px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        select { background-color: #333; color: #fff; border: 1px solid #00ff88; }
        
        #callButton { background-color: #00ff88; color: #000; }
        #acceptButton { background-color: #00aaff; color: #fff; display: none; }
        #hangupButton { background-color: #ff3366; color: #fff; display: none; } /* Red Hangup Button */
        
        .action-bar {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }
        .action-btn { background-color: #333; color: #fff; border: 1px solid #555; }
        .action-btn.active { background-color: #ff3366; color: #fff; border: 1px solid #ff3366; }
        .action-btn.screen { background-color: #00aaff; color: #000; border: none; }
        .action-btn.pip { background-color: #9c27b0; color: #fff; border: none; } 

        #statusText {
            background-color: #333;
            padding: 10px 20px;
            border-radius: 8px;
            color: #ffcc00;
            margin-top: 15px;
            font-size: 1.1rem;
            text-align: center;
            border: 1px solid #ffcc00;
            min-width: 300px;
        }

        #callTimer {
            display: none;
            font-size: 1.8rem;
            color: #00ff88;
            font-weight: bold;
            margin-top: 10px;
            font-family: monospace;
            text-shadow: 0px 0px 10px rgba(0, 255, 136, 0.5);
        }

        .main-content {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            max-width: 900px;
            justify-content: center;
            margin-top: 20px;
        }

        .video-container {
            display: flex;
            flex-direction: column; 
            gap: 20px;
            width: 100%;
        }
        
        .video-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            transition: all 0.4s ease;
        }
        
        video {
            width: 100%;
            border: 3px solid #00ff88;
            border-radius: 12px;
            background-color: #000;
            box-shadow: 0px 0px 15px rgba(0, 255, 136, 0.2);
            object-fit: cover;
            max-height: 70vh;
        }
    </style>
</head>
<body>

    <h2>Premium HD Video Call</h2>
    
    <div class="controls">
        <select id="qualitySelect">
            <option value="1080">Full HD (1080p)</option>
            <option value="720">HD (720p)</option>
        </select>
        <button id="callButton">Start Call 📞</button>
        <button id="acceptButton">Accept Call 🟢</button>
        <button id="hangupButton">End Call 🛑</button> </div>

    <div class="action-bar">
        <button id="toggleMicBtn" class="action-btn">🎤 Mic On</button>
        <button id="toggleCamBtn" class="action-btn">📷 Cam On</button>
        <button id="flipCamBtn" class="action-btn flip">🔄 Flip Cam</button>
        <button id="shareScreenBtn" class="action-btn screen">💻 Share Screen</button>
        <button id="pipBtn" class="action-btn pip">🔲 Mini Screen</button> 
    </div>
    
    <div id="statusText">Waiting for participant to join... ⏳</div>
    
    <div id="callTimer">00:00</div>

    <div class="main-content">
        <div class="video-container" id="videoContainer">
            <div class="video-box" id="localBox" style="order: 1;">
                <video id="localVideo" autoplay playsinline muted></video>
            </div>
            <div class="video-box" id="remoteBox" style="order: 2;">
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const callButton = document.getElementById('callButton');
        const acceptButton = document.getElementById('acceptButton');
        const hangupButton = document.getElementById('hangupButton'); // Added Reference
        const statusText = document.getElementById('statusText');
        const qualitySelect = document.getElementById('qualitySelect');
        const localBox = document.getElementById('localBox');
        const remoteBox = document.getElementById('remoteBox');
        
        const toggleMicBtn = document.getElementById('toggleMicBtn');
        const toggleCamBtn = document.getElementById('toggleCamBtn');
        const flipCamBtn = document.getElementById('flipCamBtn');
        const shareScreenBtn = document.getElementById('shareScreenBtn');
        const pipBtn = document.getElementById('pipBtn'); 
        
        const callTimer = document.getElementById('callTimer');

        const socket = io('https://extreme-video-call-1080p-30fps.onrender.com');

        let localStream;
        let screenStream;
        let peerConnection;
        let incomingOffer = null;
        let iceCandidateQueue = [];

        let isAudioMuted = false;
        let isVideoMuted = false;
        let currentFacingMode = "user";

        let timerInterval;
        let startTime;

        const servers = {
            iceServers: [
                { urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] },
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
            ]
        };

        // --- TIMER FUNCTIONS ---
        function startTimer() {
            clearInterval(timerInterval); 
            callTimer.style.display = 'block';
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const minutes = Math.floor(elapsed / 60000).toString().padStart(2, '0');
                const seconds = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
                callTimer.innerText = `${minutes}:${seconds}`;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            callTimer.style.display = 'none';
            callTimer.innerText = "00:00";
        }

        function forceRemoteOnTop() {
            if(remoteBox && localBox) {
                remoteBox.style.order = "1";
                localBox.style.order = "2";
            }
        }

        function applyLocalMirror(isFrontCam) {
            if (isFrontCam && !screenStream) {
                localVideo.style.transform = "scaleX(-1)";
                localVideo.style.webkitTransform = "scaleX(-1)";
            } else {
                localVideo.style.transform = "scaleX(1)";
                localVideo.style.webkitTransform = "scaleX(1)";
            }
        }

        function applyRemoteMirror(mode) {
            if (mode === "user") {
                remoteVideo.style.transform = "scaleX(-1)";
                remoteVideo.style.webkitTransform = "scaleX(-1)";
            } else {
                remoteVideo.style.transform = "scaleX(1)";
                remoteVideo.style.webkitTransform = "scaleX(1)";
            }
        }

        // --- NAYA: CALL TERMINATION FUNCTION (CLEAN RESET) ---
        function cleanResetCall(statusMessage, statusBg, statusColor) {
            stopTimer();
            
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (remoteVideo) remoteVideo.srcObject = null;
            if (screenStream) stopScreenShare();

            statusText.innerText = statusMessage;
            statusText.style.backgroundColor = statusBg;
            statusText.style.color = statusColor;

            // Reset UI Layout & Buttons
            callButton.style.display = 'inline-block';
            hangupButton.style.display = 'none';
            acceptButton.style.display = 'none';
            localBox.style.order = "1";
            remoteBox.style.order = "2";
        }

        // Manual End Call Click Handler
        hangupButton.addEventListener('click', () => {
            socket.emit('leave-call'); // Inform backend/other user instantly
            cleanResetCall("Call ended 🛑", "#333", "#ff3366");
        });

        socket.emit('join');
        socket.on('user-joined', () => {
            statusText.innerText = "Participant is online. Ready to call 📞";
            statusText.style.backgroundColor = "#00ff88";
            statusText.style.color = "#000";
            socket.emit('join-ack'); 
        });
        socket.on('join-ack', () => {
            statusText.innerText = "Participant is online. Ready to call 📞";
            statusText.style.backgroundColor = "#00ff88";
            statusText.style.color = "#000";
        });
        
        // Jab doosra banda call kaat de
        socket.on('user-left', () => {
            cleanResetCall("Participant left the call ❌", "#ff3366", "#fff");
        });

        socket.on('camera-facing', (mode) => {
            applyRemoteMirror(mode);
        });

        async function startCamera(quality) {
            if(localStream) localStream.getTracks().forEach(track => track.stop()); 
            
            const audioConstraints = {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true
            };

            const constraints = quality === '1080' 
                ? { video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: currentFacingMode }, audio: audioConstraints }
                : { video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: currentFacingMode }, audio: audioConstraints };

            try {
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                localVideo.srcObject = localStream;
                
                applyLocalMirror(currentFacingMode === "user");
                socket.emit('camera-facing', currentFacingMode);
                
                if(peerConnection && !screenStream) {
                    const videoTrack = localStream.getVideoTracks()[0];
                    const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if(sender) await sender.replaceTrack(videoTrack); 
                }
                
                localStream.getAudioTracks()[0].enabled = !isAudioMuted;
                localStream.getVideoTracks()[0].enabled = !isVideoMuted;
            } catch (error) {
                console.error("Camera error:", error);
            }
        }
        qualitySelect.addEventListener('change', (e) => startCamera(e.target.value));

        flipCamBtn.addEventListener('click', () => {
            currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
            if (!screenStream) startCamera(qualitySelect.value);
        });

        toggleMicBtn.addEventListener('click', () => {
            if(localStream) {
                isAudioMuted = !isAudioMuted;
                localStream.getAudioTracks()[0].enabled = !isAudioMuted;
                toggleMicBtn.innerText = isAudioMuted ? "🔇 Mic Off" : "🎤 Mic On";
                toggleMicBtn.classList.toggle('active', isAudioMuted);
            }
        });

        toggleCamBtn.addEventListener('click', () => {
            if(localStream) {
                isVideoMuted = !isVideoMuted;
                localStream.getVideoTracks()[0].enabled = !isVideoMuted;
                toggleCamBtn.innerText = isVideoMuted ? "🚫 Cam Off" : "📷 Cam On";
                toggleCamBtn.classList.toggle('active', isVideoMuted);
            }
        });

        shareScreenBtn.addEventListener('click', async () => {
            if (!screenStream) {
                try {
                    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const screenTrack = screenStream.getVideoTracks()[0];
                    
                    if (peerConnection) {
                        const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                        if (sender) await sender.replaceTrack(screenTrack);
                    }
                    
                    localVideo.srcObject = screenStream;
                    applyLocalMirror(false);
                    socket.emit('camera-facing', "environment");
                    
                    shareScreenBtn.innerText = "🛑 Stop Share";
                    shareScreenBtn.style.backgroundColor = "#ff3366";
                    screenTrack.onended = stopScreenShare;
                } catch (e) { 
                    alert("Screen share failed: " + e.message);
                }
            } else {
                stopScreenShare();
            }
        });

        async function stopScreenShare() {
            if (screenStream) {
                screenStream.getTracks().forEach(track => track.stop());
                screenStream = null;
            }
            if (localStream) {
                localVideo.srcObject = localStream;
                applyLocalMirror(currentFacingMode === "user");
                socket.emit('camera-facing', currentFacingMode);

                if (peerConnection) {
                    const videoTrack = localStream.getVideoTracks()[0];
                    const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender) await sender.replaceTrack(videoTrack);
                }
            }
            shareScreenBtn.innerText = "💻 Share Screen";
            shareScreenBtn.style.backgroundColor = "#00aaff";
        }

        pipBtn.addEventListener('click', async () => {
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                } else if (remoteVideo.readyState === 4 && remoteVideo.srcObject) { 
                    await remoteVideo.requestPictureInPicture();
                } else {
                    alert("Mini Screen tab chalega jab dost ki video aayegi!");
                }
            } catch (error) { console.error("PiP failed", error); }
        });

        function setupPeerConnection() {
            peerConnection = new RTCPeerConnection(servers);
            const streamToSend = screenStream || localStream;
            if (streamToSend) {
                streamToSend.getTracks().forEach(track => peerConnection.addTrack(track, streamToSend));
            }
            peerConnection.ontrack = (event) => remoteVideo.srcObject = event.streams[0];
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) socket.emit('ice-candidate', event.candidate);
            };
        }

        callButton.addEventListener('click', async () => {
            statusText.innerText = "Connecting... ⏳";
            statusText.style.backgroundColor = "#ffcc00";
            statusText.style.color = "#000";
            callButton.style.display = 'none';
            hangupButton.style.display = 'inline-block'; // Show Hangup Button
            
            setupPeerConnection();
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('offer', offer);
        });

        socket.on('offer', async (offer) => {
            incomingOffer = offer; 
            statusText.innerText = "Incoming video call... 📞";
            statusText.style.backgroundColor = "#ffcc00";
            statusText.style.color = "#000";
            callButton.style.display = 'none';
            acceptButton.style.display = 'inline-block';
        });

        acceptButton.addEventListener('click', async () => {
            acceptButton.style.display = 'none';
            hangupButton.style.display = 'inline-block'; // Show Hangup Button
            statusText.innerText = "Connection Established 🟢";
            statusText.style.backgroundColor = "#00ff88";
            
            forceRemoteOnTop(); 
            startTimer(); 

            setupPeerConnection();
            await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingOffer));
            iceCandidateQueue.forEach(async (candidate) => await peerConnection.addIceCandidate(new RTCIceCandidate(candidate)));
            iceCandidateQueue = [];
            
            socket.emit('camera-facing', currentFacingMode);

            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', answer);
        });

        socket.on('answer', async (answer) => {
            statusText.innerText = "Connection Established 🟢";
            statusText.style.backgroundColor = "#00ff88";
            
            forceRemoteOnTop(); 
            startTimer(); 
            
            socket.emit('camera-facing', currentFacingMode);

            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
            iceCandidateQueue.forEach(async (candidate) => await peerConnection.addIceCandidate(new RTCIceCandidate(candidate)));
            iceCandidateQueue = [];
        });

        socket.on('ice-candidate', async (candidate) => {
            if (peerConnection && peerConnection.remoteDescription) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
            } else {
                iceCandidateQueue.push(candidate);
            }
        });

        startCamera(qualitySelect.value);
    </script>
</body>
</html>
