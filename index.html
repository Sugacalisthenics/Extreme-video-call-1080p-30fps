<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium HD Video Call</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        
        .controls {
            margin-top: 10px;
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            align-items: center;
        }
        select, button {
            padding: 10px 15px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        select { background-color: #333; color: #fff; border: 1px solid #00ff88; }
        
        #callButton { background-color: #00ff88; color: #000; }
        #acceptButton { background-color: #ff3366; color: #fff; display: none; }
        
        .action-bar {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .action-btn { background-color: #333; color: #fff; border: 1px solid #555; }
        .action-btn.active { background-color: #ff3366; color: #fff; border: 1px solid #ff3366; }
        .action-btn.screen { background-color: #00aaff; color: #000; border: none; }
        .action-btn.flip { background-color: #ffcc00; color: #000; border: none; }
        .action-btn.pip { background-color: #9c27b0; color: #fff; border: none; } /* PiP Button */

        #statusText {
            background-color: #333;
            padding: 10px 20px;
            border-radius: 8px;
            color: #ffcc00;
            margin-top: 15px;
            font-size: 1.1rem;
            text-align: center;
            border: 1px solid #ffcc00;
            min-width: 300px;
        }

        .main-content {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
            align-items: flex-start;
            margin-top: 20px;
        }

        .video-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 2;
            min-width: 300px;
        }
        
        .video-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            transition: all 0.4s ease;
        }
        
        video {
            width: 100%;
            border: 3px solid #00ff88;
            border-radius: 12px;
            background-color: #000;
            box-shadow: 0px 0px 15px rgba(0, 255, 136, 0.2);
        }
        
        #localVideo, #remoteVideo { transform: scaleX(-1); -webkit-transform: scaleX(-1); }
        .no-mirror { transform: none !important; -webkit-transform: none !important; }

        .chat-container {
            flex: 1;
            min-width: 300px;
            max-width: 400px;
            background-color: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 500px;
        }
        .chat-header {
            background-color: #333;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }
        .chat-messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-input-area {
            display: flex;
            padding: 10px;
            background-color: #222;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            align-items: center;
        }
        #chatInput {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: none;
            background-color: #444;
            color: #fff;
            outline: none;
        }
        #sendBtn {
            margin-left: 8px;
            background-color: #00ff88;
            color: #000;
        }
        
        /* Attachment Button Style */
        #attachBtn {
            background: transparent;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            margin-right: 8px;
            padding: 5px;
        }
        #attachBtn:hover { transform: scale(1.1); }

    </style>
</head>
<body>

    <h2>Premium HD Video Call</h2>
    
    <div class="controls">
        <select id="qualitySelect">
            <option value="1080">Full HD (1080p)</option>
            <option value="720">HD (720p)</option>
        </select>
        <button id="callButton">Start Call 📞</button>
        <button id="acceptButton">Accept Call 🟢</button>
    </div>

    <div class="action-bar">
        <button id="toggleMicBtn" class="action-btn">🎤 Mic On</button>
        <button id="toggleCamBtn" class="action-btn">📷 Cam On</button>
        <button id="flipCamBtn" class="action-btn flip">🔄 Flip Cam</button>
        <button id="shareScreenBtn" class="action-btn screen">💻 Share Screen</button>
        <button id="pipBtn" class="action-btn pip">🔲 PiP Mode</button>
    </div>
    
    <div id="statusText">Waiting for participant to join... ⏳</div>

    <div class="main-content">
        <div class="video-container" id="videoContainer">
            <div class="video-box" id="localBox" style="order: 1;">
                <video id="localVideo" autoplay playsinline muted></video>
            </div>
            <div class="video-box" id="remoteBox" style="order: 2;">
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-header">Live Chat & Files 💬📁</div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="file" id="fileInput" style="display: none;" />
                <button id="attachBtn" title="Send a File">📎</button>
                <input type="text" id="chatInput" placeholder="Type a message..." />
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
