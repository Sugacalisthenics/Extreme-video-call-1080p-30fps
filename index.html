<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium HD Video Call</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .controls {
            margin-top: 10px;
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }
        select, button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        select { background-color: #333; color: #fff; border: 1px solid #00ff88; }
        
        #callButton { background-color: #00ff88; color: #000; }
        #callButton:hover { background-color: #00cc6a; }
        
        #acceptButton { background-color: #ff3366; color: #fff; display: none; }
        #acceptButton:hover { background-color: #e62e5c; }

        #statusText {
            background-color: #333;
            padding: 10px 20px;
            border-radius: 8px;
            color: #ffcc00;
            margin-top: 15px;
            font-size: 1.2rem;
            text-align: center;
            border: 1px solid #ffcc00;
            transition: all 0.3s ease;
            min-width: 300px;
        }

        .video-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }
        
        .video-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            transition: all 0.4s ease; /* Smooth layout transition */
        }
        
        video {
            width: 100%;
            border: 3px solid #00ff88;
            border-radius: 12px;
            background-color: #000;
            box-shadow: 0px 0px 20px rgba(0, 255, 136, 0.3);
        }
        
        #localVideo, #remoteVideo {
            transform: scaleX(-1); 
            -webkit-transform: scaleX(-1);
        }
    </style>
</head>
<body>

    <h2>Premium HD Video Call</h2>
    
    <div class="controls">
        <select id="qualitySelect">
            <option value="1080">Full HD (1080p)</option>
            <option value="720">HD (720p)</option>
        </select>
        <button id="callButton">Start Call 📞</button>
        <button id="acceptButton">Accept Call 🟢</button>
    </div>
    
    <div id="statusText">Waiting for participant to join... ⏳</div>

    <div class="video-container" id="videoContainer">
        <div class="video-box" id="localBox" style="order: 1;">
            <h3>You (Local)</h3>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        
        <div class="video-box" id="remoteBox" style="order: 2;">
            <h3>Remote User</h3>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
