<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God Mode Video Call</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .video-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        video {
            width: 100%;
            max-width: 600px;
            border: 3px solid #00ff88;
            border-radius: 12px;
            background-color: #000;
            box-shadow: 0px 0px 20px rgba(0, 255, 136, 0.3);
        }
        
        /* YAHAN HAI FIX: Dono videos ko mirror kar diya */
        #localVideo, #remoteVideo {
            transform: scaleX(-1); 
            -webkit-transform: scaleX(-1);
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #00ff88;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #00cc6a; }
    </style>
</head>
<body>

    <h2>Premium 1080p Video Call</h2>
    
    <button id="callButton">Dost Ko Call Lagao 📞</button>

    <div class="video-container">
        <div>
            <h3>Aap (Local)</h3>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        
        <div>
            <h3>Dost (Remote)</h3>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <script src="http://localhost:5000/socket.io/socket.io.js"></script>
    <script src="script.js"></script>

</body>
</html>
